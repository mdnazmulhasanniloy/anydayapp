services:
  backend:
    image: nazmulhasn/any_day_app_backend:latest
    container_name: any_day_app_backend
    restart: unless-stopped
    env_file: .env
    environment:
      - NODE_ENV=development  
    expose:
      - '5000'
      - '5005' 
    depends_on:
      mongo:
        condition: service_started
      redis:
        condition: service_started
    networks:
      - any_day_app_net

  ai:
    image: nazmulhasn/any_day_app_ai:latest
    container_name: any_day_app_ai
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      NODE_ENV: development
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    ports:
      - '2007:2007'
    depends_on:
      mongo:
        condition: service_started
    networks:
      - any_day_app_net


  nginx:
    image: nginx:1.25-alpine
    container_name: any_day_app_nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot
    depends_on:
      - backend
      # - frontend
    networks:
      - any_day_app_net 

  certbot:
    image: certbot/certbot:latest
    container_name: any_day_app_certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    networks:
      - any_day_app_net  
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done;'"

  mongo:
    image: mongo:7.0
    container_name: any_day_app_mongo
    restart: unless-stopped
    command: ["--replSet", "rs0", "--bind_ip_all", "--keyFile", "/etc/mongo-keyfile"]
    environment:
      MONGO_INITDB_DATABASE: any_day_app
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
      - ./mongo-keyfile:/etc/mongo-keyfile:ro
    expose:
      - '27017'
    ports:
      - '127.0.0.1:27017:27017'
    networks:
      - any_day_app_net
  
  mongo-init:
    image: mongo:7.0
    container_name: any_day_app_mongo_init
    restart: "no"
    command: |
      bash -c "
        sleep 10 &&
        mongosh --host mongo --authenticationDatabase admin -u $$MONGO_ROOT_USER -p $$MONGO_ROOT_PASSWORD --eval '
          try { rs.status() } catch(e) {
            rs.initiate({_id: \"rs0\", members: [{_id: 0, host: \"mongo:27017\"}]});
          }
        '
      "
    environment:
      MONGO_ROOT_USER: ${MONGO_ROOT_USER}
      MONGO_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    depends_on:
      mongo:
        condition: service_started
    networks:
      - any_day_app_net

  redis:
    image: redis:7.2-alpine
    container_name: any_day_app_redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy noeviction
    volumes:
      - redis_data:/data
    expose:
      - '6379'
    networks:
      - any_day_app_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5



volumes:
  mongo_data:
  mongo_config:
  redis_data:

networks:
  any_day_app_net:
    driver: bridge
   
